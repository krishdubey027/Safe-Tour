{% extends "base.html" %}

{% block title %}Login - SafeTour{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to access your personalized SafeTour workspace</p>
        
        <!-- Google Quick Login (Compulsory) -->
        <a href="{{ url_for('google_login') }}" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-logo">
            <span>Continue with Google</span>
        </a>

        <div class="auth-divider">
            <span>or email credentials</span>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@domain.com" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" class="form-control">
            </div>

            <!-- Optional Role Helper based on landing page selection -->
            {% if role_hint %}
                <input type="hidden" name="role_hint" value="{{ role_hint }}">
            {% endif %}

            <button type="submit" class="btn-primary btn-block">Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
        </form>

        <p class="auth-footer">
            New to SafeTour? <a href="{{ url_for('register', role_hint=role_hint) }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
